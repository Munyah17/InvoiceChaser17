[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# API redirects for cleaner URLs
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA catch-all — must be last, lets React Router handle all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
