[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# ── Cache-Busting Rules ────────────────────────────────────────────────────
# index.html must NEVER be cached — it references hashed asset filenames.
# Serving a stale index.html is why "3-month-old" deploys persist.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"
    Surrogate-Control = "no-store"

# Hashed assets (JS/CSS generated by Vite) are content-addressed — safe to cache forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static assets in /public with no hash — use a short cache
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# ── API proxy ──────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/:splat"
  status = 200

# ── SPA catch-all — must be last ──────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
